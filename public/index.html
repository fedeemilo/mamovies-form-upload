<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mamovies — Subir temporada</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a22;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #e63946, #c1121f);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.2; }
    .header-text p  { font-size: 13px; color: #666; margin-top: 2px; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    label .required { color: #e63946; margin-left: 3px; }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus { border-color: #e63946; }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder { color: #444; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .file-zone {
      width: 100%;
      background: #0f0f13;
      border: 2px dashed #2a2a38;
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .file-zone:hover, .file-zone.drag-over {
      border-color: #e63946;
      background: #16101a;
    }

    .file-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .file-icon { font-size: 28px; margin-bottom: 8px; }
    .file-label { font-size: 14px; color: #666; }
    .file-label span { color: #e63946; font-weight: 600; }
    .file-name { margin-top: 8px; font-size: 13px; color: #e63946; font-weight: 500; word-break: break-all; display: none; }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button[type="submit"]:hover:not(:disabled) { opacity: 0.9; }
    button[type="submit"]:active:not(:disabled) { transform: scale(0.99); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Feedback ── */
    .feedback {
      margin-top: 20px;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }

    .feedback.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      display: flex;
    }

    .feedback.error {
      background: rgba(230, 57, 70, 0.1);
      border: 1px solid rgba(230, 57, 70, 0.3);
      color: #f87171;
      display: flex;
    }

    .feedback .feedback-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .feedback .feedback-detail { font-size: 12px; color: inherit; opacity: 0.7; margin-top: 4px; }

    /* ── Progress panel ── */
    .progress-panel {
      margin-top: 24px;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 16px 20px;
      display: none;
    }

    .progress-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      margin-bottom: 14px;
    }

    .step-list { display: flex; flex-direction: column; gap: 10px; }

    .step-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
      transition: color 0.3s;
    }

    .step-item.active { color: #e0e0e0; }
    .step-item.done   { color: #4ade80; }
    .step-item.error  { color: #f87171; }

    .step-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .step-item.active .step-dot { background: #e63946; animation: pulse 1s ease-in-out infinite; }
    .step-item.done .step-dot   { display: none; }
    .step-item.error .step-dot  { display: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">🎬</div>
      <div class="header-text">
        <h1>Mamovies</h1>
        <p>Subir temporada de serie</p>
      </div>
    </div>

    <form id="uploadForm" novalidate>
      <div id="formFields">
      <div class="form-group">
        <label for="serie">Serie<span class="required">*</span></label>
        <input type="text" id="serie" name="Serie" placeholder="Ej: Breaking Bad" required autocomplete="off" />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="temporada">Temporada<span class="required">*</span></label>
          <input type="number" id="temporada" name="Temporada" placeholder="1" min="1" value="1" required />
        </div>
        <div class="form-group">
          <label for="episodios">Episodios<span class="required">*</span></label>
          <input type="number" id="episodios" name="Episodios" placeholder="Ej: 13" min="1" required />
        </div>
      </div>

      <div class="form-group">
        <label>Torrent<span class="required">*</span></label>
        <div class="file-zone" id="fileZone">
          <input type="file" id="torrent" name="Torrent" accept=".torrent" required />
          <div class="file-icon">📦</div>
          <div class="file-label">
            <span>Elegí un archivo</span> o arrastrá acá<br />
            <small style="color:#555;font-size:12px;">.torrent</small>
          </div>
          <div class="file-name" id="fileName"></div>
        </div>
      </div>

      </div> <!-- /formFields -->
      <button type="submit" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Iniciar subida</span>
      </button>

      <div class="feedback" id="feedback">
        <div class="feedback-icon" id="feedbackIcon"></div>
        <div>
          <div id="feedbackMsg"></div>
          <div class="feedback-detail" id="feedbackDetail"></div>
        </div>
      </div>

      <!-- Progress panel — shown after successful submit -->
      <div class="progress-panel" id="progressPanel">
        <div class="progress-title">Estado del workflow</div>
        <div class="step-list" id="stepList"></div>
      </div>
    </form>
  </div>

  <script>
    const form        = document.getElementById('uploadForm');
    const fileInput   = document.getElementById('torrent');
    const fileZone    = document.getElementById('fileZone');
    const fileName    = document.getElementById('fileName');
    const submitBtn   = document.getElementById('submitBtn');
    const spinner     = document.getElementById('spinner');
    const btnText     = document.getElementById('btnText');
    const feedback    = document.getElementById('feedback');
    const feedbackIcon    = document.getElementById('feedbackIcon');
    const feedbackMsg     = document.getElementById('feedbackMsg');
    const feedbackDetail  = document.getElementById('feedbackDetail');
    const progressPanel   = document.getElementById('progressPanel');
    const stepList        = document.getElementById('stepList');

    // Steps that are "terminal" — no more events after these
    const TERMINAL_STEPS = new Set(['upload_ok', 'timeout']);

    // Icon and label per step key
    const STEP_META = {
      torrent_started:  { icon: '🚀', label: 'Torrent enviado a qBittorrent' },
      downloading:      { icon: '⬇️', label: 'Descargando...' },
      downloaded:       { icon: '✅', label: 'Descarga completada' },
      files_moved:      { icon: '📁', label: 'Archivos organizados en /series' },
      season_prepared:  { icon: '🗂️', label: 'Temporada preparada' },
      upload_ok:        { icon: '🎬', label: 'Serie subida a Mamovies' },
      timeout:          { icon: '⏰', label: 'Timeout: descarga cancelada' },
    };

    let activeSource = null;

    // ── File input ──────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : '';
      fileName.style.display = fileInput.files[0] ? 'block' : 'none';
    });

    fileZone.addEventListener('dragover', e => { e.preventDefault(); fileZone.classList.add('drag-over'); });
    fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
    fileZone.addEventListener('drop', e => {
      e.preventDefault();
      fileZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
        fileName.style.display = 'block';
      }
    });

    // ── UI helpers ──────────────────────────────────────────
    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Subiendo...' : 'Iniciar subida';
    }

    function showFeedback(type, msg, detail) {
      feedback.className = `feedback ${type}`;
      feedbackIcon.textContent = type === 'success' ? '✅' : '❌';
      feedbackMsg.textContent = msg;
      feedbackDetail.textContent = detail || '';
    }

    function clearFeedback() {
      feedback.className = 'feedback';
    }

    // ── Progress helpers ────────────────────────────────────
    function getOrCreateStep(key) {
      let el = document.getElementById('step-' + key);
      if (!el) {
        const meta = STEP_META[key] || { icon: '•', label: key };
        el = document.createElement('div');
        el.id = 'step-' + key;
        el.className = 'step-item active';
        el.innerHTML = `
          <div class="step-dot"></div>
          <div class="step-icon" style="display:none">${meta.icon}</div>
          <span class="step-label">${meta.label}</span>`;
        stepList.appendChild(el);
      }
      return el;
    }

    function resolveStep(key, isError) {
      const el = getOrCreateStep(key);
      el.classList.remove('active');
      el.classList.add(isError ? 'error' : 'done');
      el.querySelector('.step-dot').style.display = 'none';
      el.querySelector('.step-icon').style.display = 'flex';
    }

    function updateProgress(step, message) {
      const el = getOrCreateStep(step);

      if (step === 'downloading') {
        // Keep as active, update label in place
        el.querySelector('.step-label').textContent = message || 'Descargando...';
      } else if (step === 'timeout') {
        resolveStep(step, true);
      } else {
        resolveStep(step, false);
      }
    }

    function openProgressStream(jobId) {
      if (activeSource) activeSource.close();

      progressPanel.style.display = 'block';
      stepList.innerHTML = '';

      activeSource = new EventSource('/events/' + jobId);

      activeSource.onmessage = e => {
        const { step, message } = JSON.parse(e.data);
        updateProgress(step, message);
        if (TERMINAL_STEPS.has(step)) {
          activeSource.close();
          activeSource = null;
          setLoading(false);
          document.getElementById('formFields').style.display = 'block';
        }
      };

      activeSource.onerror = () => {
        activeSource.close();
        activeSource = null;
        setLoading(false);
        document.getElementById('formFields').style.display = 'block';
      };
    }

    // ── Submit ──────────────────────────────────────────────
    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearFeedback();

      const serie     = document.getElementById('serie').value.trim();
      const temporada = document.getElementById('temporada').value;
      const episodios = document.getElementById('episodios').value;
      const file      = fileInput.files[0];

      if (!serie || !temporada || !episodios || !file) {
        showFeedback('error', 'Completá todos los campos antes de enviar.');
        return;
      }

      setLoading(true);
      progressPanel.style.display = 'none';
      stepList.innerHTML = '';

      try {
        const formData = new FormData();
        formData.append('Serie', serie);
        formData.append('Temporada', temporada);
        formData.append('Episodios', episodios);
        formData.append('Torrent', file);

        const res  = await fetch('/submit', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok && data.success) {
          showFeedback('success', data.message);
          form.reset();
          fileName.style.display = 'none';
          document.getElementById('formFields').style.display = 'none';
          openProgressStream(data.jobId);
          // Keep loading spinner until workflow finishes
        } else {
          showFeedback('error', data.error || 'Error desconocido.', data.detail || '');
          setLoading(false);
        }
      } catch (err) {
        showFeedback('error', 'Error de red al contactar el servidor.', err.message);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
